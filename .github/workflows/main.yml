name: Build Dubligram APK

on:
  push:
    branches: [ "master", "main" ] # Сборка будет запускаться при каждом пуше в эти ветки
  workflow_dispatch: # Позволяет запустить сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        # Эта команда превращает твой код в готовый файл .apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dubligram-1.0.1-Genesis
          path: TMessagesProj/build/outputs/apk/debug/*.apk
          # После завершения файл появится во вкладке Artifacts
